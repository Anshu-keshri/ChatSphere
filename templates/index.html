<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body>
    <!-- Main Container -->
    <div class="flex flex-col h-screen max-w-2xl mx-auto bg-gray-100">
        <!-- Header -->
        <div class="p-4 bg-white shadow-md flex justify-between items-center">
            <h1 class="text-xl font-bold">WebSocket {{ app_name | default("Something default") }}</h1>
            <p id="clientId" class="text-sm text-gray-600"></p>
        </div>
        <!-- Message Area -->
        <div id="messageArea" class="flex-1 overflow-y-auto p-4 bg-white">
            <ul id="messagesList" class="flex flex-col space-y-2"></ul>
        </div>
        <!-- Input Area -->
        <div class="p-4 bg-white shadow-md flex items-center">
            <input
                type="text"
                id="messageInput"
                class="flex-1 p-2 border rounded-l-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Type a message..."
            >
            <button
                id="sendButton"
                class="p-2 bg-blue-500 text-white rounded-r-lg hover:bg-blue-600"
            >
                Send
            </button>
        </div>
    </div>

    <!-- JavaScript for WebSocket and Dynamic Styling -->
    <script>
        let clientId;
        const socket = new WebSocket("ws://localhost:8000/ws");

        socket.onopen = function(event) {
            console.log("WebSocket connection opened");
        };

        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.type === "connected") {
                clientId = data.client_id;
                document.getElementById("clientId").textContent = `You are Client ${clientId}`;
            } else {
                const messagesList = document.getElementById("messagesList");
                const li = document.createElement("li");
                li.textContent = `Client ${data.sender}: ${data.message}`;
                // Base message styling
                li.classList.add("p-2", "rounded-lg", "max-w-xs");
                // Conditional styling based on sender
                if (data.sender === clientId) {
                    li.classList.add("ml-auto", "bg-blue-500", "text-white");
                } else {
                    li.classList.add("bg-gray-200", "text-gray-800");
                }
                messagesList.appendChild(li);
                // Auto-scroll to the latest message
                const messageArea = document.getElementById("messageArea");
                messageArea.scrollTop = messageArea.scrollHeight;
            }
        };

        socket.onclose = function(event) {
            console.log("WebSocket connection closed");
        };

        socket.onerror = function(error) {
            console.error("WebSocket error:", error);
        };

        const sendButton = document.getElementById("sendButton");
        const messageInput = document.getElementById("messageInput");

        sendButton.addEventListener("click", function() {
            const message = messageInput.value;
            if (message) {
                socket.send(message);
                messageInput.value = "";
            }
        });

        messageInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendButton.click();
            }
        });
    </script>
</body>
</html>
